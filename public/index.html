<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Primer Workforce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primer: { 900:'#0f172a', 800:'#1e293b', 700:'#334155', accent:'#3b82f6', success:'#22c55e', danger:'#ef4444', warning:'#f59e0b' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-100 text-slate-900 antialiased">
  <div id="root"></div>
</body>
</html>
